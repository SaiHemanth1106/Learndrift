version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: learndrift-db
    environment:
      POSTGRES_USER: learndrift_user
      POSTGRES_PASSWORD: learndrift_password
      POSTGRES_DB: learndrift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learndrift_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learndrift-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learndrift-backend
    environment:
      DATABASE_URL: postgresql://learndrift_user:learndrift_password@postgres:5432/learndrift
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - learndrift-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learndrift-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - learndrift-network
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  postgres_data:

networks:
  learndrift-network:
    driver: bridge
